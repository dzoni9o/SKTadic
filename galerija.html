<style>
.filter-bar{display:flex;gap:6px;margin-bottom:1.8rem;flex-wrap:wrap}
.fbtn{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:0.5px solid var(--border);background:var(--surface);color:var(--muted);transition:all .2s;font-family:'Nunito',sans-serif}
.fbtn:hover{border-color:var(--accent);color:var(--accent)}
.fbtn.active{background:rgba(201,168,76,.15);color:var(--accent);border-color:var(--accent)}

.album-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.album-card{background:var(--surface);border-radius:14px;border:0.5px solid var(--border);box-shadow:var(--shadow);overflow:hidden;cursor:pointer;transition:all .22s}
.album-card:hover{transform:translateY(-4px);border-color:var(--accent);box-shadow:0 8px 32px rgba(30,48,85,.15)}
.album-cover{position:relative;aspect-ratio:4/3;overflow:hidden;background:var(--mid)}
.album-cover img{width:100%;height:100%;object-fit:cover;transition:transform .35s;display:block}
.album-card:hover .album-cover img{transform:scale(1.08)}
.album-badge{position:absolute;bottom:10px;right:10px;background:rgba(0,0,0,.65);color:#fff;font-size:12px;font-weight:800;padding:3px 9px;border-radius:20px;backdrop-filter:blur(4px)}
.album-info{padding:12px 14px 14px}
.album-title{font-size:14px;font-weight:800;color:var(--light);line-height:1.35;margin-bottom:4px}
.album-meta{font-size:12px;color:var(--muted);font-weight:600}

#lb-album{position:absolute;top:18px;left:24px;color:rgba(255,255,255,.75);font-size:13px;font-weight:700;max-width:60vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

@media(max-width:800px){.album-grid{grid-template-columns:repeat(2,1fr);gap:12px}}
@media(max-width:480px){.album-grid{grid-template-columns:1fr 1fr;gap:10px}.album-info{padding:10px 12px 12px}.album-title{font-size:13px}}
@media(max-width:360px){.album-grid{grid-template-columns:1fr}}
</style>
</head>

var curAlbum=null,curIdx=0;

function pluralFoto(n){return n+' '+(n===1?'fotografija':'fotografija');}

function buildGrid(cat){
  var ag=document.getElementById('ag');
  ag.innerHTML='';
  var list=ALBUMS.filter(function(a){return cat==='sve'||a.cat===cat;});
  list.forEach(function(album){
    var d=document.createElement('div');
    d.className='album-card';
    d.innerHTML='<div class="album-cover"><img src="'+album.cover+'" alt="'+album.title+'" loading="lazy" onerror="this.style.opacity=0"><span class="album-badge">&#128247; '+album.photos.length+'</span></div><div class="album-info"><div class="album-title">'+album.title+'</div><div class="album-meta">'+album.year+' &middot; '+pluralFoto(album.photos.length)+'</div></div>';
    d.onclick=function(){openAlbum(album,0);};
    ag.appendChild(d);
  });
}

function fg(cat,btn){
  document.querySelectorAll('.fbtn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  buildGrid(cat);
}

function openAlbum(album,idx){
  curAlbum=album;
  curIdx=idx||0;
  document.getElementById('lb-album').textContent=album.title+' · '+album.year;
  showPhoto();
  document.getElementById('lightbox').classList.add('open');
}

function showPhoto(){
  var p=curAlbum.photos[curIdx];
  document.getElementById('lb-img').src=p.s;
  var hasMult=curAlbum.photos.length>1;
  var cap=(hasMult?(curIdx+1)+' / '+curAlbum.photos.length:'')+(p.t?' — '+p.t:'');
  document.getElementById('lb-caption').textContent=cap;
  document.getElementById('lb-prev').style.display=hasMult?'':'none';
  document.getElementById('lb-next').style.display=hasMult?'':'none';
}

function lbNav(d){
  curIdx=(curIdx+d+curAlbum.photos.length)%curAlbum.photos.length;
  showPhoto();
}

function closeLb(){document.getElementById('lightbox').classList.remove('open');}

function lbBgClick(e){if(e.target===document.getElementById('lightbox'))closeLb();}

document.addEventListener('keydown',function(e){
  if(!document.getElementById('lightbox').classList.contains('open'))return;
  if(e.key==='ArrowLeft')lbNav(-1);
  else if(e.key==='ArrowRight')lbNav(1);
  else if(e.key==='Escape')closeLb();
});

buildGrid('sve');
