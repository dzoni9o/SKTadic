<style>
.filter-bar{display:flex;gap:6px;margin-bottom:1.5rem;flex-wrap:wrap}
.fbtn{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:0.5px solid var(--border);background:var(--surface);color:var(--muted);transition:all .2s;font-family:'Nunito',sans-serif}
.fbtn:hover{border-color:var(--accent);color:var(--accent)}
.fbtn.active{background:rgba(201,168,76,.15);color:var(--accent);border-color:var(--accent)}
.gallery-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.g-thumb{border-radius:12px;overflow:hidden;cursor:pointer;aspect-ratio:4/3;position:relative;background:var(--mid)}
.g-thumb img{width:100%;height:100%;object-fit:cover;transition:transform .3s;display:block}
.g-thumb:hover img{transform:scale(1.07)}
.g-thumb .overlay{position:absolute;inset:0;background:rgba(201,168,76,0);transition:background .25s;display:flex;align-items:center;justify-content:center}
.g-thumb:hover .overlay{background:rgba(201,168,76,.15)}
</style>
</head>

<script>
var imgs=[{s:'https://sahklubtadic.com/wp-content/uploads/2012/05/Zvanicno-Otvaranje-Kluba1.jpg',c:'otvaranje',t:'Zvanično otvaranje ŠK Tadić'},{s:'https://sahklubtadic.com/wp-content/uploads/2012/05/Otvaranje-kluba-4.jpg',c:'otvaranje',t:'Otvaranje kluba'},{s:'https://sahklubtadic.com/wp-content/uploads/2012/05/Otvaranje-kluba-5.jpg',c:'otvaranje',t:'Otvaranje kluba'},{s:'https://sahklubtadic.com/wp-content/uploads/2012/05/Otvaranje-kluba-6.jpg',c:'otvaranje',t:'Otvaranje kluba'},{s:'https://sahklubtadic.com/wp-content/uploads/2012/05/Otvaranje-kluba-7.jpg',c:'otvaranje',t:'Otvaranje kluba'},{s:'https://sahklubtadic.com/wp-content/uploads/2012/05/Otvaranje-kluba-8.jpg',c:'otvaranje',t:'Otvaranje kluba'},{s:'https://sahklubtadic.com/wp-content/uploads/2012/05/Otvaranje-kluba-9.jpg',c:'otvaranje',t:'Otvaranje kluba'},{s:'https://sahklubtadic.com/wp-content/uploads/2012/05/Otvaranje-kluba-10.jpg',c:'otvaranje',t:'Otvaranje kluba'},{s:'https://sahklubtadic.com/wp-content/uploads/2012/05/Otvaranje-kluba-11.jpg',c:'otvaranje',t:'Otvaranje kluba'},{s:'https://sahklubtadic.com/wp-content/uploads/2012/05/Otvaranje-kluba-12.jpg',c:'otvaranje',t:'Otvaranje kluba'},{s:'https://sahklubtadic.com/wp-content/uploads/2012/05/Otvaranje-kluba-13.jpg',c:'otvaranje',t:'Otvaranje kluba'},{s:'https://sahklubtadic.com/wp-content/uploads/2012/05/Otvaranje-kluba-14.jpg',c:'otvaranje',t:'Otvaranje kluba'},{s:'https://sahklubtadic.com/wp-content/uploads/2012/05/Otvaranje-kluba-15.jpg',c:'otvaranje',t:'Otvaranje kluba'},{s:'https://sahklubtadic.com/wp-content/uploads/2012/05/Otvaranje-kluba-16.jpg',c:'otvaranje',t:'Otvaranje kluba'},{s:'https://sahklubtadic.com/wp-content/uploads/2012/05/Otvaranje-kluba-17.jpg',c:'otvaranje',t:'Otvaranje kluba'},{s:'https://sahklubtadic.com/wp-content/uploads/2012/05/Otvaranje-kluba-18.jpg',c:'otvaranje',t:'Otvaranje kluba'},{s:'https://sahklubtadic.com/wp-content/uploads/2012/05/Otvaranje-kluba-20.jpg',c:'otvaranje',t:'Otvaranje kluba'},{s:'https://sahklubtadic.com/wp-content/uploads/2012/05/Otvaranje-kluba-21.jpg',c:'otvaranje',t:'Otvaranje kluba'},{s:'https://sahklubtadic.com/wp-content/uploads/2012/05/Otvaranje-kluba-22.jpg',c:'otvaranje',t:'Otvaranje kluba'},{s:'https://sahklubtadic.com/wp-content/uploads/2012/05/Otvaranje-kluba-24.jpg',c:'otvaranje',t:'Otvaranje kluba'},{s:'https://sahklubtadic.com/wp-content/uploads/2012/05/Otvaranje-kluba-26.jpg',c:'otvaranje',t:'Otvaranje kluba'},{s:'https://sahklubtadic.com/wp-content/uploads/2012/05/Otvaranje-kluba-3.jpg',c:'otvaranje',t:'Otvaranje kluba'},{s:'https://sahklubtadic.com/wp-content/uploads/2026/05/2.jpg',c:'turnir',t:'Četiri zlata — školsko prvenstvo Srbije 2026'},{s:'https://sahklubtadic.com/wp-content/uploads/2025/02/3.jpg',c:'turnir',t:'Blanuša Vukan — pobednik pripremnog turnira 2025'},{s:'https://sahklubtadic.com/wp-content/uploads/2025/02/1.jpg',c:'turnir',t:'Blanuša Vukan'},{s:'https://sahklubtadic.com/wp-content/uploads/2016/11/prvaci2-e1480258480558.jpg',c:'turnir',t:'Apsolutni prvaci Pionirske lige Beograda 2016'},{s:'https://sahklubtadic.com/wp-content/uploads/2017/05/marko-1-e1494858973927.jpg',c:'turnir',t:'Ivanović Marko — školski prvak Srbije 2017'},{s:'https://sahklubtadic.com/wp-content/uploads/2016/04/Marko1.jpg',c:'turnir',t:'Marko Ivanović — kadetski prvak Beograda'},{s:'https://sahklubtadic.com/wp-content/uploads/2015/12/Perunovic.jpg',c:'turnir',t:'GM Miloš Perunović — All Stars 2015'},{s:'https://sahklubtadic.com/wp-content/uploads/2023/08/154.jpg',c:'turnir',t:'Kamp Srebrno Jezero 2024'},{s:'https://sahklubtadic.com/wp-content/uploads/2024/04/6.jpg',c:'turnir',t:'Kadetska liga Beograda 2024'},{s:'https://sahklubtadic.com/wp-content/uploads/2024/04/1.jpg',c:'turnir',t:'Školsko prvenstvo Srbije — Mladenovac 2024'},{s:'https://sahklubtadic.com/wp-content/uploads/2012/02/chess-tadza03.jpg',c:'turnir',t:'Članovi ŠK Tadić na kadetskom i juniorskom predsvenstvu'},{s:'https://sahklubtadic.com/wp-content/uploads/2016/11/tabla4.jpg',c:'turnir',t:'Gran Pri turnir'}];
var visible=imgs.slice(),lbIdx=0;
function buildGrid(cat){var g=document.getElementById('gg');g.innerHTML='';visible=imgs.filter(function(i){return cat==='sve'||i.c===cat;});visible.forEach(function(img,i){var d=document.createElement('div');d.className='g-thumb';d.innerHTML='<img src="'+img.s+'" alt="'+img.t+'" loading="lazy" onerror="this.parentNode.style.background='#1a1408'"><div class="overlay"></div>';d.onclick=function(){openLb(i);};g.appendChild(d);});}
function fg(cat,btn){document.querySelectorAll('.fbtn').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');buildGrid(cat);}
function openLb(i){lbIdx=i;document.getElementById('lb-img').src=visible[i].s;document.getElementById('lb-caption').textContent=visible[i].t+' ('+(i+1)+'/'+visible.length+')';document.getElementById('lightbox').classList.add('open');}
function closeLb(e){if(!e||e.target===document.getElementById('lightbox')||e.target.id==='lb-close')document.getElementById('lightbox').classList.remove('open');}
function lbNav(d){lbIdx=(lbIdx+d+visible.length)%visible.length;openLb(lbIdx);}
document.addEventListener('keydown',function(e){if(!document.getElementById('lightbox').classList.contains('open'))return;if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);if(e.key==='Escape')document.getElementById('lightbox').classList.remove('open');});
buildGrid('sve');
</script>
